<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020515"/>
      <stop offset="40%" stop-color="#0a1030"/>
      <stop offset="100%" stop-color="#050818"/>
    </linearGradient>
    <linearGradient id="nebula" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3498db"/>
      <stop offset="50%" stop-color="#8e44ad"/>
      <stop offset="100%" stop-color="#e74c3c"/>
    </linearGradient>
    <radialGradient id="starfield" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#1a2a5a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="glow4">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg4)"/>
  <circle cx="300" cy="200" r="180" fill="url(#starfield)"/>
  <!-- Stars -->
  <g fill="white">
    <circle cx="100" cy="60" r="1" opacity="0.8"/>
    <circle cx="250" cy="40" r="1.5" opacity="0.6"/>
    <circle cx="450" cy="80" r="1" opacity="0.9"/>
    <circle cx="600" cy="50" r="1.2" opacity="0.5"/>
    <circle cx="720" cy="100" r="1" opacity="0.7"/>
    <circle cx="150" cy="150" r="0.8" opacity="0.6"/>
    <circle cx="680" cy="200" r="1.3" opacity="0.4"/>
    <circle cx="50" cy="300" r="1" opacity="0.5"/>
    <circle cx="750" cy="350" r="0.8" opacity="0.7"/>
    <circle cx="350" cy="430" r="1" opacity="0.3"/>
    <circle cx="550" cy="450" r="1.2" opacity="0.5"/>
    <circle cx="180" cy="420" r="0.8" opacity="0.6"/>
    <circle cx="620" cy="280" r="1" opacity="0.4"/>
    <circle cx="80" cy="180" r="1.5" opacity="0.3"/>
    <circle cx="500" cy="150" r="0.8" opacity="0.8"/>
  </g>
  <!-- DNA helix / biology element -->
  <g transform="translate(400, 160)" filter="url(#glow4)" opacity="0.8">
    <!-- Orbit rings -->
    <ellipse cx="0" cy="0" rx="65" ry="25" fill="none" stroke="#3498db" stroke-width="1.5" opacity="0.5" transform="rotate(-30)"/>
    <ellipse cx="0" cy="0" rx="65" ry="25" fill="none" stroke="#8e44ad" stroke-width="1.5" opacity="0.5" transform="rotate(30)"/>
    <ellipse cx="0" cy="0" rx="65" ry="25" fill="none" stroke="#e74c3c" stroke-width="1.5" opacity="0.3" transform="rotate(90)"/>
    <!-- Center planet/cell -->
    <circle cx="0" cy="0" r="18" fill="#0a1030" stroke="#3498db" stroke-width="2"/>
    <circle cx="0" cy="0" r="8" fill="#3498db" opacity="0.3"/>
    <circle cx="0" cy="0" r="3" fill="#3498db" opacity="0.8"/>
    <!-- Orbiting particles -->
    <circle cx="55" cy="-20" r="4" fill="#8e44ad" opacity="0.8"/>
    <circle cx="-50" cy="25" r="3" fill="#3498db" opacity="0.8"/>
    <circle cx="0" cy="-60" r="3.5" fill="#e74c3c" opacity="0.6"/>
  </g>
  <!-- Title -->
  <text x="400" y="285" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" fill="#e74c3c" letter-spacing="6" opacity="0.8">NASA SPACE APPS</text>
  <text x="400" y="325" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, sans-serif" font-size="44" font-weight="700" fill="#ecf0f1">BioExplorer</text>
  <text x="400" y="360" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, sans-serif" font-size="15" fill="#5a7a9a" letter-spacing="2">RAG CHAT FOR SPACE BIOLOGY</text>
  <rect x="310" y="390" width="180" height="1.5" rx="1" fill="#3498db" opacity="0.3"/>
  <text x="400" y="425" text-anchor="middle" font-family="monospace" font-size="13" fill="#4a6a8a">Python · RAG · LangChain</text>
</svg>