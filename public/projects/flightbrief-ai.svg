<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0c1929"/>
      <stop offset="60%" stop-color="#142840"/>
      <stop offset="100%" stop-color="#0a1520"/>
    </linearGradient>
    <linearGradient id="sky5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2980b9"/>
      <stop offset="100%" stop-color="#3498db"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg5)"/>
  <!-- Horizon line glow -->
  <ellipse cx="400" cy="380" rx="500" ry="8" fill="#2980b9" opacity="0.08"/>
  <!-- Radar/compass lines -->
  <g transform="translate(400, 190)" opacity="0.12">
    <circle cx="0" cy="0" r="60" fill="none" stroke="#3498db" stroke-width="1"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="#3498db" stroke-width="1"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="#3498db" stroke-width="0.5"/>
    <line x1="0" y1="-80" x2="0" y2="80" stroke="#3498db" stroke-width="0.5"/>
    <line x1="-80" y1="0" x2="80" y2="0" stroke="#3498db" stroke-width="0.5"/>
    <line x1="-56" y1="-56" x2="56" y2="56" stroke="#3498db" stroke-width="0.5"/>
    <line x1="56" y1="-56" x2="-56" y2="56" stroke="#3498db" stroke-width="0.5"/>
  </g>
  <!-- Plane icon -->
  <g transform="translate(400, 175)" opacity="0.9">
    <path d="M0 -40 L6 -20 L30 0 L6 5 L8 25 L0 20 L-8 25 L-6 5 L-30 0 L-6 -20Z" fill="none" stroke="#3498db" stroke-width="2" stroke-linejoin="round"/>
    <!-- Blip on radar -->
    <circle cx="0" cy="0" r="3" fill="#3498db"/>
  </g>
  <!-- Data readout lines -->
  <g opacity="0.2" font-family="monospace" font-size="10" fill="#3498db">
    <text x="100" y="120">ALT: 35,000 FT</text>
    <text x="100" y="138">SPD: 450 KTS</text>
    <text x="580" y="120">HDG: 270°</text>
    <text x="580" y="138">N47°15' W85°32'</text>
  </g>
  <!-- Title -->
  <text x="400" y="310" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, sans-serif" font-size="44" font-weight="700" fill="#ecf0f1">FlightBrief</text>
  <text x="400" y="340" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, sans-serif" font-size="20" fill="#3498db" font-weight="300">AI</text>
  <text x="400" y="372" text-anchor="middle" font-family="monospace" font-size="12" fill="#4a7a9a" letter-spacing="4">AI LOCALHOST HACKATHON</text>
  <rect x="320" y="395" width="160" height="1.5" rx="1" fill="#3498db" opacity="0.3"/>
  <text x="400" y="428" text-anchor="middle" font-family="monospace" font-size="13" fill="#4a6a8a">Python · AI · Aviation</text>
</svg>