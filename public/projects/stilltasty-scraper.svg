<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg10" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0f05"/>
      <stop offset="50%" stop-color="#201508"/>
      <stop offset="100%" stop-color="#120a03"/>
    </linearGradient>
    <linearGradient id="fresh10" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f39c12"/>
      <stop offset="100%" stop-color="#e67e22"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg10)"/>
  <!-- Clock/timer element -->
  <g transform="translate(400, 155)">
    <circle cx="0" cy="0" r="48" fill="none" stroke="#f39c12" stroke-width="2" opacity="0.3"/>
    <circle cx="0" cy="0" r="44" fill="none" stroke="#f39c12" stroke-width="1" opacity="0.15"/>
    <!-- Clock hands -->
    <line x1="0" y1="0" x2="0" y2="-30" stroke="#f39c12" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="0" y1="0" x2="20" y2="-10" stroke="#f39c12" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    <circle cx="0" cy="0" r="3" fill="#f39c12" opacity="0.6"/>
    <!-- Hour markers -->
    <g opacity="0.2" fill="#f39c12">
      <circle cx="0" cy="-42" r="2"/><circle cx="42" cy="0" r="2"/>
      <circle cx="0" cy="42" r="2"/><circle cx="-42" cy="0" r="2"/>
    </g>
    <!-- Freshness indicator arc (green portion) -->
    <path d="M0 -48 A48 48 0 0 1 41 24" fill="none" stroke="#27ae60" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <!-- Expiring indicator arc (red portion) -->
    <path d="M41 24 A48 48 0 0 1 -42 24" fill="none" stroke="#e74c3c" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
  </g>
  <!-- Data scraping lines -->
  <g opacity="0.1" font-family="monospace" font-size="9" fill="#f39c12">
    <text x="120" y="100">&lt;span class="shelf-life"&gt;</text>
    <text x="120" y="115">  3-5 days (refrigerated)</text>
    <text x="120" y="130">&lt;/span&gt;</text>
    <text x="520" y="380">&lt;div class="expiry"&gt;</text>
    <text x="520" y="395">  Best by: 2024-03-15</text>
    <text x="520" y="410">&lt;/div&gt;</text>
  </g>
  <!-- Small food icons -->
  <g opacity="0.12">
    <!-- Apple shape -->
    <circle cx="180" cy="350" r="10" fill="none" stroke="#e74c3c" stroke-width="1.5"/>
    <path d="M180 340 C182 335, 186 336, 185 340" fill="none" stroke="#27ae60" stroke-width="1"/>
    <!-- Carrot shape -->
    <path d="M620 100 L625 85 L630 100Z" fill="none" stroke="#e67e22" stroke-width="1.5"/>
    <path d="M622 85 C624 80, 628 80, 626 85" fill="none" stroke="#27ae60" stroke-width="1"/>
  </g>
  <!-- Title -->
  <text x="400" y="295" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, sans-serif" font-size="42" font-weight="700" fill="#ecf0f1">StillTasty</text>
  <text x="400" y="332" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, sans-serif" font-size="20" fill="url(#fresh10)" font-weight="300">Scraper</text>
  <text x="400" y="365" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, sans-serif" font-size="14" fill="#8a7050" letter-spacing="3">FOOD EXPIRATION DATA</text>
  <rect x="320" y="388" width="160" height="1.5" rx="1" fill="#f39c12" opacity="0.25"/>
  <text x="400" y="422" text-anchor="middle" font-family="monospace" font-size="13" fill="#8a7050">Python · Web Scraping</text>
</svg>