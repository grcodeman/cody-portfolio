<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#04101a"/>
      <stop offset="50%" stop-color="#081828"/>
      <stop offset="100%" stop-color="#040e18"/>
    </linearGradient>
    <linearGradient id="water7" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5dade2"/>
      <stop offset="100%" stop-color="#2e86c1"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg7)"/>
  <!-- Water wave pattern at bottom -->
  <path d="M0 420 Q100 400, 200 420 Q300 440, 400 420 Q500 400, 600 420 Q700 440, 800 420 L800 500 L0 500Z" fill="#2e86c1" opacity="0.06"/>
  <path d="M0 440 Q100 420, 200 440 Q300 460, 400 440 Q500 420, 600 440 Q700 460, 800 440 L800 500 L0 500Z" fill="#2e86c1" opacity="0.04"/>
  <!-- Water droplet icon -->
  <g transform="translate(400, 155)">
    <path d="M0 -55 C-5 -35, -35 0, -35 20 C-35 45, -20 60, 0 60 C20 60, 35 45, 35 20 C35 0, 5 -35, 0 -55Z" fill="none" stroke="url(#water7)" stroke-width="2.5"/>
    <!-- Inner reflection -->
    <ellipse cx="-10" cy="20" rx="8" ry="12" fill="#5dade2" opacity="0.1" transform="rotate(-15 -10 20)"/>
    <!-- Small bubbles -->
    <circle cx="8" cy="30" r="3" fill="none" stroke="#5dade2" stroke-width="1" opacity="0.3"/>
    <circle cx="15" cy="15" r="2" fill="none" stroke="#5dade2" stroke-width="1" opacity="0.2"/>
  </g>
  <!-- 1st Place badge -->
  <rect x="320" y="232" width="160" height="28" rx="14" fill="#ffd700" opacity="0.15" stroke="#ffd700" stroke-width="1" stroke-opacity="0.3"/>
  <text x="400" y="251" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, sans-serif" font-size="13" font-weight="700" fill="#ffd700" letter-spacing="2">🏆 1ST PLACE</text>
  <!-- Title -->
  <text x="400" y="315" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, sans-serif" font-size="42" font-weight="700" fill="#ecf0f1">HackWMU</text>
  <text x="400" y="348" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, sans-serif" font-size="20" fill="#5dade2" font-weight="300">2024</text>
  <text x="400" y="378" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, sans-serif" font-size="14" fill="#4a7a9a" letter-spacing="3">WATER RESEARCH TRACKER</text>
  <rect x="320" y="400" width="160" height="1.5" rx="1" fill="#5dade2" opacity="0.25"/>
  <text x="400" y="433" text-anchor="middle" font-family="monospace" font-size="13" fill="#4a6a8a">Flutter · Dart</text>
</svg>