<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#120a20"/>
      <stop offset="50%" stop-color="#1a1030"/>
      <stop offset="100%" stop-color="#0d0818"/>
    </linearGradient>
    <linearGradient id="purple9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9b59b6"/>
      <stop offset="100%" stop-color="#8e44ad"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg9)"/>
  <!-- Chat bubble elements -->
  <g transform="translate(400, 145)">
    <!-- User message bubble -->
    <rect x="-70" y="-50" width="100" height="32" rx="12" fill="#9b59b6" opacity="0.15" stroke="#9b59b6" stroke-width="1" stroke-opacity="0.3"/>
    <g opacity="0.4">
      <rect x="-58" y="-42" width="40" height="3" rx="1.5" fill="#9b59b6"/>
      <rect x="-58" y="-34" width="60" height="3" rx="1.5" fill="#9b59b6"/>
    </g>
    <!-- Bot response bubble -->
    <rect x="-30" y="-5" width="120" height="42" rx="12" fill="#8e44ad" opacity="0.12" stroke="#8e44ad" stroke-width="1" stroke-opacity="0.25"/>
    <g opacity="0.35">
      <rect x="-18" y="5" width="70" height="3" rx="1.5" fill="#8e44ad"/>
      <rect x="-18" y="13" width="90" height="3" rx="1.5" fill="#8e44ad"/>
      <rect x="-18" y="21" width="50" height="3" rx="1.5" fill="#8e44ad"/>
    </g>
    <!-- AI sparkle icon -->
    <g transform="translate(55, -35)" opacity="0.6">
      <path d="M0 -8 L2 -2 L8 0 L2 2 L0 8 L-2 2 L-8 0 L-2 -2Z" fill="#9b59b6"/>
    </g>
    <!-- Inventory box icons -->
    <g transform="translate(-60, 55)" opacity="0.2">
      <rect x="0" y="0" width="20" height="18" rx="2" fill="none" stroke="#9b59b6" stroke-width="1.5"/>
      <line x1="0" y1="6" x2="20" y2="6" stroke="#9b59b6" stroke-width="1"/>
      <rect x="28" y="0" width="20" height="18" rx="2" fill="none" stroke="#9b59b6" stroke-width="1.5"/>
      <line x1="28" y1="6" x2="48" y2="6" stroke="#9b59b6" stroke-width="1"/>
      <rect x="56" y="0" width="20" height="18" rx="2" fill="none" stroke="#9b59b6" stroke-width="1.5"/>
      <line x1="56" y1="6" x2="76" y2="6" stroke="#9b59b6" stroke-width="1"/>
    </g>
  </g>
  <!-- Floating dots -->
  <circle cx="150" cy="100" r="2" fill="#9b59b6" opacity="0.15"/>
  <circle cx="650" cy="120" r="2.5" fill="#8e44ad" opacity="0.12"/>
  <circle cx="680" cy="380" r="1.5" fill="#9b59b6" opacity="0.1"/>
  <circle cx="120" cy="350" r="2" fill="#8e44ad" opacity="0.1"/>
  <!-- Title -->
  <text x="400" y="305" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, sans-serif" font-size="42" font-weight="700" fill="#ecf0f1">Inventory</text>
  <text x="400" y="342" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, sans-serif" font-size="22" fill="url(#purple9)" font-weight="400">LLM Chatbot</text>
  <text x="400" y="375" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, sans-serif" font-size="14" fill="#6a5a8a" letter-spacing="3">AI-POWERED ASSISTANT</text>
  <rect x="320" y="398" width="160" height="1.5" rx="1" fill="#9b59b6" opacity="0.25"/>
  <text x="400" y="430" text-anchor="middle" font-family="monospace" font-size="13" fill="#6a5a8a">Python · LLM</text>
</svg>