<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1200"/>
      <stop offset="50%" stop-color="#1f1a08"/>
      <stop offset="100%" stop-color="#0f0d05"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#f0c040"/>
      <stop offset="100%" stop-color="#e8a820"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg3)"/>
  <!-- Leaderboard bars -->
  <g transform="translate(400, 145)">
    <!-- Podium visualization -->
    <!-- 2nd place -->
    <rect x="-100" y="20" width="60" height="80" rx="4" fill="#c0c0c0" opacity="0.2"/>
    <text x="-70" y="14" text-anchor="middle" font-family="monospace" font-size="22" fill="#c0c0c0" opacity="0.6">2</text>
    <!-- 1st place -->
    <rect x="-30" y="-20" width="60" height="120" rx="4" fill="#ffd700" opacity="0.25"/>
    <text x="0" y="-30" text-anchor="middle" font-family="monospace" font-size="22" fill="#ffd700" opacity="0.8">1</text>
    <!-- Crown on 1st -->
    <path d="M-12 -52 L-8 -42 L0 -50 L8 -42 L12 -52" fill="none" stroke="#ffd700" stroke-width="2" opacity="0.7"/>
    <!-- 3rd place -->
    <rect x="40" y="40" width="60" height="60" rx="4" fill="#cd7f32" opacity="0.2"/>
    <text x="70" y="34" text-anchor="middle" font-family="monospace" font-size="22" fill="#cd7f32" opacity="0.6">3</text>
  </g>
  <!-- Coin icons scattered -->
  <g opacity="0.15">
    <circle cx="150" cy="100" r="15" fill="none" stroke="#ffd700" stroke-width="2"/>
    <text x="150" y="106" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#ffd700">$</text>
    <circle cx="650" cy="380" r="12" fill="none" stroke="#ffd700" stroke-width="2"/>
    <text x="650" y="385" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#ffd700">$</text>
    <circle cx="700" cy="80" r="10" fill="none" stroke="#ffd700" stroke-width="1.5"/>
    <text x="700" y="84" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#ffd700">$</text>
  </g>
  <!-- Title -->
  <text x="400" y="300" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, sans-serif" font-size="44" font-weight="800" fill="url(#gold)">CAE Bucks</text>
  <text x="400" y="335" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, sans-serif" font-size="16" fill="#a09060" letter-spacing="4">TICKET REWARD DASHBOARD</text>
  <rect x="310" y="365" width="180" height="2" rx="1" fill="#ffd700" opacity="0.25"/>
  <text x="400" y="400" text-anchor="middle" font-family="monospace" font-size="13" fill="#8a7a50">HTML · CSS · JavaScript</text>
</svg>